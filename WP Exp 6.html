<!DOCTYPE html>
<html>
<head>
    <title>Personal Portfolio</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #222;
            --primary: #4CAF50;
        }

        body.dark {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --primary: #00c853;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: var(--card);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border-radius: 5px;
        }

        .error {
            color: red;
            font-size: 13px;
        }

        .stored-data {
            margin-top: 20px;
            padding: 10px;
            background: #e9e9e9;
            border-radius: 5px;
            font-size: 14px;
        }

        body.dark .stored-data {
            background: #2c2c2c;
        }

        .toggle-btn {
            background: #333;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="toggle-btn" onclick="toggleTheme()">🌙 Toggle Dark Mode</button>

    <h2>Contact Me</h2>

    <form id="contactForm">
        <input type="email" id="email" placeholder="Enter Email">
        <div id="emailError" class="error"></div>

        <input type="text" id="phone" placeholder="Enter Phone Number">
        <div id="phoneError" class="error"></div>

        <input type="password" id="password" placeholder="Enter Password">
        <div id="passwordError" class="error"></div>

        <button type="submit">Submit</button>
    </form>

    <div class="stored-data" id="storedData"></div>
</div>

<script>
    const form = document.getElementById("contactForm");

    // Load theme preference
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }

    function toggleTheme() {
        document.body.classList.toggle("dark");
        const theme = document.body.classList.contains("dark") ? "dark" : "light";
        localStorage.setItem("theme", theme);
    }

    // Load stored form data
    window.onload = function() {
        const savedData = JSON.parse(localStorage.getItem("formData"));
        if (savedData) {
            displayStoredData(savedData);
        }
    };

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        let valid = true;

        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value.trim();

        document.getElementById("emailError").textContent = "";
        document.getElementById("phoneError").textContent = "";
        document.getElementById("passwordError").textContent = "";

        // Email validation
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!emailPattern.test(email)) {
            document.getElementById("emailError").textContent = "Invalid email format";
            valid = false;
        }

        // Phone validation (10 digits)
        const phonePattern = /^[0-9]{10}$/;
        if (!phonePattern.test(phone)) {
            document.getElementById("phoneError").textContent = "Phone must be 10 digits";
            valid = false;
        }

        // Password validation (min 6 chars)
        if (password.length < 6) {
            document.getElementById("passwordError").textContent = "Password must be at least 6 characters";
            valid = false;
        }

        if (valid) {
            const formData = { email, phone, password };
            localStorage.setItem("formData", JSON.stringify(formData));
            displayStoredData(formData);
            alert("Form submitted successfully!");
            form.reset();
        }
    });

    function displayStoredData(data) {
        document.getElementById("storedData").innerHTML =
            "<strong>Stored Data:</strong><br>" +
            "Email: " + data.email + "<br>" +
            "Phone: " + data.phone + "<br>" +
            "Password: " + data.password;
    }
</script>

</body>
</html>
