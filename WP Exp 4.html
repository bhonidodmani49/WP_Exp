<!DOCTYPE html>
<html>
<head>
    <title>Interactive Web App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
            transition: background-color 0.5s ease;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            background-color: white;
        }

        input {
            padding: 8px;
            width: 80%;
            margin: 10px 0;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        #greetBtn { background-color: #4CAF50; color: white; }
        #clearBtn { background-color: #f44336; color: white; }
        #colorBtn { background-color: #2196F3; color: white; }

        #message {
            font-weight: bold;
            margin-top: 10px;
        }

        #counterDisplay {
            margin-top: 10px;
            font-size: 14px;
            color: gray;
        }

        #clickCount {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌟 Interactive Web App</h2>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <div id="counterDisplay">Characters: 0</div>

    <br>
    <button id="greetBtn">Greet Me</button>
    <button id="clearBtn">Clear</button>
    <button id="colorBtn">Change Background</button>

    <p id="message"></p>
    <p id="clickCount">Button Clicks: 0</p>
</div>

<script>
    const nameInput = document.getElementById("nameInput");
    const greetBtn = document.getElementById("greetBtn");
    const clearBtn = document.getElementById("clearBtn");
    const colorBtn = document.getElementById("colorBtn");
    const message = document.getElementById("message");
    const counterDisplay = document.getElementById("counterDisplay");
    const clickCount = document.getElementById("clickCount");

    let count = 0;

    // Greeting Function
    function greetUser() {
        const name = nameInput.value.trim();

        if (name === "") {
            message.textContent = "⚠ Please enter your name!";
            message.style.color = "red";
        } else {
            message.textContent = "🎉 Hello, " + name + "! Welcome!";
            message.style.color = "green";
            count++;
            clickCount.textContent = "Button Clicks: " + count;
        }
    }

    // Clear Function
    function clearAll() {
        nameInput.value = "";
        message.textContent = "";
        counterDisplay.textContent = "Characters: 0";
    }

    // Background Color Change
    function changeBackground() {
        const colors = ["#f8b195", "#f67280", "#c06c84", "#6c5b7b", "#355c7d"];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.style.backgroundColor = randomColor;
    }

    // Live Character Counter
    function updateCharacterCount() {
        counterDisplay.textContent = "Characters: " + nameInput.value.length;
    }

    // Event Listeners
    greetBtn.addEventListener("click", greetUser);
    clearBtn.addEventListener("click", clearAll);
    colorBtn.addEventListener("click", changeBackground);
    nameInput.addEventListener("input", updateCharacterCount);
</script>

</body>
</html>
